spring.application.name=backend

# Kite Connect API credentials
kite.api.key=YOUR_API_KEY
kite.api.secret=YOUR_API_KEY
# Access token is generated daily via the /api/auth/login endpoint
# Leave as DEMO initially — use the login endpoint to get a fresh one
kite.api.access.token=DEMO

# CORS allowed origin for the React dev server
cors.allowed.origin=http://localhost:5173
